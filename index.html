<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ed25519 SchnorrQ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import * as ed from 'https://esm.sh/@noble/ed25519';
    import { blake2b } from 'https://esm.sh/@noble/hashes@1/blake2';
    import { sha512 } from 'https://esm.sh/@noble/hashes@1/sha512';
    import { bytesToHex, hexToBytes, utf8ToBytes } from 'https://esm.sh/@noble/hashes@1/utils';

    let currentPrivateKey = null;
    let currentPublicKey = null;

    // ==================== 工具函数 ====================
    // 清理 Hex 输入（支持 0x、前后空格、逗号、空格分隔）
    function cleanHex(input) {
      return input.trim()
        .replace(/^0x/i, '')           // 去掉 0x
        .replace(/[\s,]/g, '')         // 去掉空格和逗号
        .toLowerCase();
    }

    // 十六进制合法性校验（新增功能）
    function isValidHex(hexString) {
      const cleaned = cleanHex(hexString);
      // 只能包含 0-9 a-f
      if (!/^[0-9a-f]*$/.test(cleaned)) return false;
      // 长度必须为偶数（每个字节2个字符）
      if (cleaned.length % 2 !== 0) return false;
      return true;
    }

    // 把字符串或 Hex 转为 Uint8Array（带合法性校验）
    function parseMessageInput(text, isHex) {
      if (isHex) {
        if (!isValidHex(text)) {
          throw new Error('Hex 格式不合法！\n\n• 只能包含 0-9、a-f、A-F\n• 长度必须为偶数（每个字节2个字符）');
        }
        const cleaned = cleanHex(text);
        return hexToBytes(cleaned);
      }
      return utf8ToBytes(text);
    }

    // 设置哈希模式
    function setHashMode(isBlake) {
      const hashFn = isBlake 
        ? (msg) => blake2b(msg, { dkLen: 64 })
        : sha512;

      ed.hashes.sha512 = hashFn;
      ed.hashes.sha512Async = (msg) => Promise.resolve(hashFn(msg));

      document.getElementById('hashLabel').innerHTML = isBlake
        ? `<span class="px-3 py-1 text-xs font-bold rounded-full bg-amber-100 text-amber-700">BLAKE2b-512</span>`
        : `<span class="px-3 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-700">SHA-512</span>`;
    }

    // ==================== 步骤1：生成/编辑密钥对 ====================
    async function generateKeypair() {
      try {
        const privKey = ed.utils.randomSecretKey();
        const pubKey = await ed.getPublicKey(privKey);

        currentPrivateKey = privKey;
        currentPublicKey = pubKey;

        document.getElementById('privKeyDisplay').value = bytesToHex(privKey);
        document.getElementById('pubKeyDisplay').value = bytesToHex(pubKey);
        document.getElementById('keypairSection').classList.remove('hidden');
      } catch (e) {
        alert('生成密钥对失败：' + e.message);
      }
    }

    async function updatePubFromPriv() {
      const privHex = cleanHex(document.getElementById('privKeyDisplay').value);
      if (privHex.length !== 64) return alert('私钥必须是 64 位 hex（32 字节）');

      try {
        const privKey = hexToBytes(privHex);
        const pubKey = await ed.getPublicKey(privKey);
        currentPrivateKey = privKey;
        currentPublicKey = pubKey;
        document.getElementById('pubKeyDisplay').value = bytesToHex(pubKey);
      } catch (e) {
        alert('私钥格式错误：' + e.message);
      }
    }

    // ==================== 步骤2：签名 ====================
    async function signMessage() {
      if (!currentPrivateKey) return alert('请先生成或导入密钥对！');

      const messageText = document.getElementById('signMessageInput').value.trim();
      const isHex = document.getElementById('signFormat').value === 'hex';

      if (!messageText) return alert('请输入消息！');

      try {
        const msgBytes = parseMessageInput(messageText, isHex);
        const signature = await ed.sign(msgBytes, currentPrivateKey);
        document.getElementById('signatureDisplay').value = bytesToHex(signature);
        document.getElementById('signResultSection').classList.remove('hidden');
      } catch (e) {
        alert(e.message);   // 显示清晰的 Hex 校验错误
      }
    }

    // ==================== 步骤3：验证 ====================
    async function verifySignature() {
      const pubHex = cleanHex(document.getElementById('verifyPubKey').value);
      const sigHex = cleanHex(document.getElementById('verifySignature').value);
      const messageText = document.getElementById('verifyMessage').value.trim();
      const isHex = document.getElementById('verifyFormat').value === 'hex';

      if (!pubHex || !sigHex || !messageText) return alert('请填写完整信息！');

      try {
        const pubKey = hexToBytes(pubHex);
        const signature = hexToBytes(sigHex);
        const msgBytes = parseMessageInput(messageText, isHex);

        const isValid = await ed.verify(signature, msgBytes, pubKey);

        const resultEl = document.getElementById('verifyResultBox');
        resultEl.classList.remove('hidden');
        resultEl.innerHTML = isValid 
          ? `<div class="flex items-center justify-center gap-3 text-green-600"><span class="text-4xl">✅</span><span class="text-2xl font-bold">验证通过</span></div>`
          : `<div class="flex items-center justify-center gap-3 text-red-600"><span class="text-4xl">❌</span><span class="text-2xl font-bold">验证失败</span></div>`;
      } catch (e) {
        alert(e.message);   // 显示清晰的 Hex 校验错误
      }
    }

    function copyToClipboard(id) {
      const text = document.getElementById(id).value;
      navigator.clipboard.writeText(text).then(() => alert('已复制到剪贴板！'));
    }

    // 全局暴露
    window.generateKeypair = generateKeypair;
    window.updatePubFromPriv = updatePubFromPriv;
    window.signMessage = signMessage;
    window.verifySignature = verifySignature;
    window.copyToClipboard = copyToClipboard;

    // 初始化
    setHashMode(false);
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('hashToggle').addEventListener('change', (e) => setHashMode(e.target.checked));
    });
  </script>
</head>
<body class="bg-[#f8f9fa] font-sans">
  <!-- 头部 -->
  <div class="bg-gradient-to-r from-[#6b46c0] to-[#8b5cf6] text-white py-8">
    <div class="max-w-4xl mx-auto px-6 text-center">
      <div class="flex items-center justify-center gap-3 mb-2">
        <div class="w-10 h-10 bg-white rounded-2xl flex items-center justify-center shadow-inner">🔐</div>
        <h1 class="text-4xl font-bold tracking-tighter">Ed25519 SchnorrQ</h1>
      </div>
      <p class="text-white/90 text-lg">高性能 Ed25519 数字签名工具 · 纯浏览器运行</p>
      <div class="inline-flex items-center gap-2 mt-4 px-5 py-1.5 bg-white/20 text-white text-sm font-medium rounded-3xl backdrop-blur-md">
        基于 @noble/ed25519 v3 + @noble/hashes · 纯 JavaScript
      </div>
    </div>
  </div>

  <div class="max-w-4xl mx-auto px-6 py-8">
    <!-- 就绪栏 + 开关 -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-5 flex items-center justify-between mb-8">
      <div class="flex items-center gap-3">
        <div class="w-5 h-5 bg-green-400 rounded-full flex items-center justify-center text-white text-xs">✓</div>
        <span class="font-medium text-gray-700">Ed25519 模块已就绪，可以开始使用</span>
      </div>
      <div class="flex items-center gap-3">
        <span class="text-sm font-medium text-gray-600">SHA-512</span>
        <label class="relative inline-flex cursor-pointer">
          <input type="checkbox" id="hashToggle" class="sr-only peer">
          <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-amber-500"></div>
        </label>
        <span class="text-sm font-medium text-gray-600">BLAKE2b</span>
        <div id="hashLabel" class="ml-2"></div>
      </div>
    </div>

    <!-- 步骤1：生成/编辑密钥对 -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 mb-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-9 h-9 bg-[#f0e8ff] text-[#6b46c0] rounded-2xl flex items-center justify-center text-2xl">🔑</div>
        <div>
          <div class="text-sm font-medium text-[#6b46c0]">步骤 1</div>
          <h2 class="text-2xl font-semibold text-gray-900">生成 / 编辑密钥对</h2>
        </div>
      </div>
      <button onclick="generateKeypair()" class="w-full bg-[#6b46c0] hover:bg-[#5a38a8] text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2 mb-6 transition">
        <span class="text-xl">🔐</span> 生成新密钥对
      </button>

      <div id="keypairSection" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-gray-500 text-sm mb-2">私钥（32 字节 hex）</label>
          <div class="relative">
            <input id="privKeyDisplay" class="w-full bg-gray-50 border border-gray-200 focus:border-[#6b46c0] rounded-2xl px-5 py-4 font-mono text-sm" placeholder="可手动编辑或粘贴">
            <button onclick="copyToClipboard('privKeyDisplay')" class="absolute right-3 top-1/2 -translate-y-1/2 px-4 py-2 text-xs bg-white border border-gray-200 rounded-xl hover:bg-gray-100">复制</button>
          </div>
          <button onclick="updatePubFromPriv()" class="mt-3 text-[#6b46c0] text-sm flex items-center gap-1 hover:underline">
            <span>从私钥生成公钥 →</span>
          </button>
        </div>
        <div>
          <label class="block text-gray-500 text-sm mb-2">公钥（32 字节 hex）</label>
          <div class="relative">
            <input id="pubKeyDisplay" class="w-full bg-gray-50 border border-gray-200 focus:border-[#6b46c0] rounded-2xl px-5 py-4 font-mono text-sm" placeholder="可手动编辑或粘贴">
            <button onclick="copyToClipboard('pubKeyDisplay')" class="absolute right-3 top-1/2 -translate-y-1/2 px-4 py-2 text-xs bg-white border border-gray-200 rounded-xl hover:bg-gray-100">复制</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 步骤2：消息签名 -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8 mb-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-9 h-9 bg-[#fff0e8] text-[#f59e0b] rounded-2xl flex items-center justify-center text-2xl">✍️</div>
        <div>
          <div class="text-sm font-medium text-[#f59e0b]">步骤 2</div>
          <h2 class="text-2xl font-semibold text-gray-900">消息签名</h2>
        </div>
      </div>

      <div class="flex items-center gap-4 mb-3">
        <span class="text-sm font-medium text-gray-600">消息格式</span>
        <select id="signFormat" class="bg-white border border-gray-300 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-[#f59e0b]">
          <option value="string">字符串（UTF-8）</option>
          <option value="hex">Hex（十六进制）</option>
        </select>
      </div>

      <label class="block text-gray-500 text-sm mb-2">待签名消息</label>
      <textarea id="signMessageInput" rows="3" class="w-full bg-gray-50 border border-gray-200 focus:border-[#f59e0b] rounded-3xl px-5 py-4 text-sm resize-none" placeholder="Hello Ed25519! 或输入 hex..."></textarea>

      <button onclick="signMessage()" class="mt-6 w-full bg-[#f59e0b] hover:bg-[#d97706] text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2 transition">
        <span class="text-xl">✍️</span> 生成签名
      </button>

      <div id="signResultSection" class="hidden mt-8">
        <label class="block text-gray-500 text-sm mb-2">签名结果（64 字节 hex）</label>
        <div class="relative">
          <input id="signatureDisplay" readonly class="w-full bg-gray-50 border border-gray-200 focus:border-[#f59e0b] rounded-2xl px-5 py-4 font-mono text-sm">
          <button onclick="copyToClipboard('signatureDisplay')" class="absolute right-3 top-1/2 -translate-y-1/2 px-4 py-2 text-xs bg-white border border-gray-200 rounded-xl hover:bg-gray-100">复制</button>
        </div>
      </div>
    </div>

    <!-- 步骤3：签名验证 -->
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-9 h-9 bg-[#d1fae5] text-[#10b981] rounded-2xl flex items-center justify-center text-2xl">✅</div>
        <div>
          <div class="text-sm font-medium text-[#10b981]">步骤 3</div>
          <h2 class="text-2xl font-semibold text-gray-900">签名验证</h2>
        </div>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-gray-500 text-sm mb-2">公钥（支持 0x、空格、逗号）</label>
          <input id="verifyPubKey" type="text" placeholder="32 字节 hex（可带 0x 或空格）" class="w-full bg-gray-50 border border-gray-200 focus:border-[#10b981] rounded-2xl px-5 py-4 font-mono text-sm">
        </div>

        <div class="flex items-center gap-4">
          <span class="text-sm font-medium text-gray-600">消息格式</span>
          <select id="verifyFormat" class="bg-white border border-gray-300 rounded-2xl px-4 py-2 text-sm focus:outline-none focus:border-[#10b981]">
            <option value="string">字符串（UTF-8）</option>
            <option value="hex">Hex（十六进制）</option>
          </select>
        </div>

        <div>
          <label class="block text-gray-500 text-sm mb-2">原始消息</label>
          <textarea id="verifyMessage" rows="2" placeholder="与步骤2保持一致" class="w-full bg-gray-50 border border-gray-200 focus:border-[#10b981] rounded-3xl px-5 py-4 text-sm"></textarea>
        </div>

        <div>
          <label class="block text-gray-500 text-sm mb-2">签名（支持 0x、空格、逗号）</label>
          <input id="verifySignature" type="text" placeholder="64 字节 hex（可带 0x 或空格）" class="w-full bg-gray-50 border border-gray-200 focus:border-[#10b981] rounded-2xl px-5 py-4 font-mono text-sm">
        </div>
      </div>

      <button onclick="verifySignature()" class="mt-8 w-full bg-[#10b981] hover:bg-[#059669] text-white py-4 rounded-2xl font-medium flex items-center justify-center gap-2 transition">
        <span class="text-xl">🔍</span> 验证签名
      </button>

      <div id="verifyResultBox" class="hidden mt-8 p-6 rounded-3xl border border-gray-100 text-center"></div>
    </div>

    <div class="text-center text-gray-400 text-xs mt-12">
      基于 @noble/ed25519 v3 · 纯浏览器端计算 · 数据零上传
    </div>
  </div>
</body>
</html>
